<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Codestral Chat | Fornever Collective</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div id="header">
      <div class="header-brand">
        <div class="logo-dot">m</div>
        <span class="brand-name">codestral</span>
      </div>
      <div class="header-right">
        <div id="language-selector" onclick="toggleLanguageMenu()">
          <span id="current-language">English</span>
          <div id="language-menu">
            <div class="language-option active" data-lang="en" onclick="setLanguage('en')">English</div>
            <div class="language-option" data-lang="fr" onclick="setLanguage('fr')">Français</div>
            <div class="language-option" data-lang="es" onclick="setLanguage('es')">Español</div>
            <div class="language-option" data-lang="de" onclick="setLanguage('de')">Deutsch</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages">
      <div id="welcome">
        <h1>How can I<br>help you?</h1>
        <p>Ask me anything — I'll think it through with you.</p>
        <div class="welcome-suggestions">
          <div class="suggestion" onclick="useSuggestion(this)">Explain quantum entanglement simply</div>
          <div class="suggestion" onclick="useSuggestion(this)">Write a haiku about the ocean at night</div>
          <div class="suggestion" onclick="useSuggestion(this)">What's the difference between RAM and storage?</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div id="footer">
      <div id="input-row">
        <div id="input-box">
          <textarea id="prompt" placeholder="Ask anything…" rows="1" autocomplete="off" spellcheck="false"></textarea>
          <button id="send-btn" onclick="handleSend()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="white"><path d="M2 8L14 2L10 8L14 14L2 8Z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/script.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Codestral Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.10);
      --text: #e8e8ef;
      --text-muted: #6b6b80;
      --font-mono: 'DM Mono', monospace;
      --font-serif: 'Instrument Serif', serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      z-index: 20;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 500;
      color: #fff;
      font-style: italic;
      font-family: var(--font-serif);
    }

    .brand-name {
      font-family: var(--font-serif);
      font-size: 18px;
      font-style: italic;
      letter-spacing: -0.02em;
    }

    /* Language Selector */
    #language-selector {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      position: relative;
      user-select: none;
    }

    #language-selector:hover {
      background: var(--accent-dim);
    }

    #language-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      min-width: 120px;
      display: none;
      z-index: 100;
    }

    #language-menu.open {
      display: block;
    }

    .language-option {
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .language-option:hover {
      background: var(--surface2);
    }

    .language-option.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar {
      width: 6px;
    }

    #messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* Message Cards */
    .msg-card {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeIn 0.2s ease both;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .msg-card.user {
      border-color: #2a2a36;
      background: #17171f;
    }

    .msg-card.ai {
      border-color: var(--accent-border);
      background: #0d0d12;
    }

    .msg-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
    }

    .msg-card-body {
      padding: 14px 16px;
      line-height: 1.65;
      font-size: 13.5px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }

    .msg-card-body code {
      font-family: var(--font-mono);
      background: var(--surface2);
      border-radius: 4px;
      padding: 2px 4px;
      border: 1px solid var(--border);
      font-size: 12.5px;
    }

    /* Input Area */
    #footer {
      flex-shrink: 0;
      background: #0a0a0d;
      border-top: 1px solid var(--border);
      padding: 12px 14px 14px;
    }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    #input-box {
      flex: 1;
      position: relative;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    #input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.15);
    }

    #prompt {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13.5px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      min-height: 22px;
      padding: 0;
      caret-color: var(--accent);
    }

    #prompt::placeholder {
      color: var(--text-muted);
    }

    #send-btn {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      opacity: 0.4;
    }

    #send-btn.active {
      opacity: 1;
    }

    #send-btn:active {
      transform: scale(0.95);
    }

    #send-btn.loading {
      opacity: 1;
      background: var(--surface2);
      cursor: not-allowed;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading Indicator */
    .loading-dots {
      display: flex;
      gap: 4px;
      justify-content: center;
      padding: 8px 0;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.4s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* Welcome Message */
    .welcome-message {
      text-align: center;
      color: var(--text-muted);
      margin: 40px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div id="header">
      <div class="header-brand">
        <div class="logo-dot">m</div>
        <span class="brand-name">codestral</span>
      </div>
      <div id="language-selector" onclick="toggleLanguageMenu()">
        <span id="current-language">English</span>
        <div id="language-menu">
          <div class="language-option active" data-lang="en" onclick="setLanguage('en')">English</div>
          <div class="language-option" data-lang="fr" onclick="setLanguage('fr')">Français</div>
          <div class="language-option" data-lang="es" onclick="setLanguage('es')">Español</div>
          <div class="language-option" data-lang="de" onclick="setLanguage('de')">Deutsch</div>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages">
      <div class="welcome-message">
        Start a conversation. Codestral will translate and generate code in your selected language.
      </div>
    </div>

    <!-- Footer -->
    <div id="footer">
      <div id="input-row">
        <div id="input-box">
          <textarea id="prompt" placeholder="Type a message or code..." rows="1" autocomplete="off" spellcheck="false"></textarea>
        </div>
        <button id="send-btn" onclick="handleSend()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="white"><path d="M1.5 2.5l13 6-13 6V2.5z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // State
    const state = {
      messages: [],
      currentLanguage: 'en',
      isLoading: false,
      apiKey: 'RrywgZmMVBvz6PTQRAHv6EjcwYBddXN4', // Your Codestral API key
      translations: {
        en: { welcomeMessage: "Start a conversation. Codestral will translate and generate code in your selected language." },
        fr: { welcomeMessage: "Commencez une conversation. Codestral traduira et générera du code dans la langue sélectionnée." },
        es: { welcomeMessage: "Inicia una conversación. Codestral traducirá y generará código en el idioma seleccionado." },
        de: { welcomeMessage: "Starten Sie eine Unterhaltung. Codestral übersetzt und generiert Code in der ausgewählten Sprache." },
      },
    };

    // DOM Elements
    const languageSelector = document.getElementById('language-selector');
    const languageMenu = document.getElementById('language-menu');
    const currentLanguageEl = document.getElementById('current-language');
    const messagesEl = document.getElementById('messages');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send-btn');

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      // Load saved language preference
      const savedLanguage = localStorage.getItem('chatLanguage');
      if (savedLanguage && state.translations[savedLanguage]) {
        setLanguage(savedLanguage);
      } else {
        setLanguage('en');
      }

      promptEl.addEventListener('input', () => {
        sendBtn.classList.toggle('active', !!promptEl.value.trim());
      });

      promptEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !state.isLoading) {
          e.preventDefault();
          handleSend();
        }
      });
    });

    // Language Functions
    function toggleLanguageMenu() {
      languageMenu.classList.toggle('open');
    }

    function setLanguage(lang) {
      state.currentLanguage = lang;
      currentLanguageEl.textContent = {
        en: 'English',
        fr: 'Français',
        es: 'Español',
        de: 'Deutsch',
      }[lang];
      document.querySelector('.welcome-message').textContent = state.translations[lang].welcomeMessage;
      languageMenu.classList.remove('open');
      localStorage.setItem('chatLanguage', lang);
    }

    // Codestral API Integration
    async function callCodestralAPI(prompt, language) {
      const endpoint = 'https://codestral.mistral.ai/v1/completions';
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.apiKey}`,
      };

      const body = {
        model: 'codestral-latest',
        prompt: `Translate and explain the following to ${language}:\n\n${prompt}`,
        max_tokens: 512,
        temperature: 0.3,
      };

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers,
          body: JSON.stringify(body),
        });

        if (!response.ok) {
          throw new Error(`Codestral API Error: ${response.status}`);
        }

        const data = await response.json();
        return data.choices[0].text.trim();
      } catch (error) {
        console.error('Codestral API error:', error);
        return `Error: Could not translate/generate code. ${error.message}`;
      }
    }

    // Message Functions
    function createMessageCard({ id, role, content }) {
      const card = document.createElement('div');
      card.className = `msg-card ${role}`;
      card.dataset.id = id;

      const header = document.createElement('div');
      header.className = 'msg-card-header';

      const roleDot = document.createElement('div');
      roleDot.className = 'role-dot';
      roleDot.textContent = role === 'ai' ? 'm' : 'u';

      const roleLabel = document.createElement('span');
      roleLabel.className = 'role-label';
      roleLabel.textContent = role === 'ai' ? 'Codestral' : 'You';

      const timestamp = document.createElement('span');
      timestamp.className = 'card-timestamp';
      timestamp.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      header.append(roleDot, roleLabel, timestamp);

      const body = document.createElement('div');
      body.className = 'msg-card-body';
      body.innerHTML = content.replace(/\n/g, '<br>');

      card.append(header, body);
      messagesEl.appendChild(card);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
    }

    // Chat Functions
    async function handleSend() {
      const text = promptEl.value.trim();
      if (!text || state.isLoading) return;

      promptEl.disabled = true;
      sendBtn.classList.add('loading');
      promptEl.value = '';

      const userMsg = { id: Date.now(), role: 'user', content: text };
      state.messages.push(userMsg);
      createMessageCard(userMsg);

      // Simulate loading
      const loadingCard = document.createElement('div');
      loadingCard.className = 'msg-card ai';
      loadingCard.innerHTML = `
        <div class="msg-card-header">
          <div class="role-dot">m</div>
          <span class="role-label">Codestral</span>
          <span class="card-timestamp">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
        </div>
        <div class="msg-card-body">
          <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      `;
      messagesEl.appendChild(loadingCard);
      scrollToBottom();

      // Call Codestral API
      state.isLoading = true;
      try {
        const aiResponse = await callCodestralAPI(text, state.currentLanguage);
        loadingCard.remove();

        const aiMsg = { id: Date.now(), role: 'ai', content: aiResponse };
        state.messages.push(aiMsg);
        createMessageCard(aiMsg);
      } catch (err) {
        loadingCard.remove();
        createMessageCard({ id: Date.now(), role: 'ai', content: `Error: ${err.message}` });
      } finally {
        state.isLoading = false;
        promptEl.disabled = false;
        sendBtn.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
